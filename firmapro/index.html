<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>FirmaPro — Mobil app veya Web</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(ellipse at 50% 40%, #0F3030 0%, #061818 65%, #020808 100%);
      color: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-height: 100vh;
    }
    .card { max-width: 480px; width: 100%; text-align: center; }
    .icon {
      width: 130px; height: 130px;
      border-radius: 30px;
      overflow: hidden;
      margin: 0 auto 28px;
      border: 3px solid #2BBFB2;
      box-shadow: 0 12px 32px rgba(0,0,0,0.5), 0 0 60px rgba(43,191,178,0.3);
    }
    .icon img { width: 100%; height: 100%; display: block; }
    h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
    h1 .accent { color: #2BBFB2; }
    .subtitle { font-size: 15px; color: #B0E5DE; opacity: 0.8; margin-bottom: 36px; }
    .prompt {
      font-size: 16px; font-weight: 600; opacity: 0.7;
      margin-bottom: 18px;
      letter-spacing: 0.3px;
    }
    .options {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-bottom: 28px;
    }
    .opt {
      display: flex; align-items: center; gap: 18px;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(43,191,178,0.30);
      border-radius: 18px;
      padding: 20px 22px;
      color: #FFFFFF;
      text-decoration: none;
      transition: all .15s;
      position: relative;
      text-align: left;
    }
    .opt:hover { transform: translateY(-2px); border-color: #2BBFB2; background: rgba(43,191,178,0.08); }
    .opt.recommended {
      background: linear-gradient(135deg, rgba(43,191,178,0.18) 0%, rgba(14,132,123,0.10) 100%);
      border-color: #2BBFB2;
      box-shadow: 0 12px 28px rgba(43,191,178,0.25);
    }
    .opt .badge {
      position: absolute;
      top: -10px; right: 16px;
      background: linear-gradient(135deg, #5DE9DD 0%, #2BBFB2 100%);
      color: #051210;
      font-size: 11px; font-weight: 800; letter-spacing: 1px;
      padding: 4px 10px;
      border-radius: 100px;
      text-transform: uppercase;
    }
    .opt .glyph {
      width: 58px; height: 58px;
      border-radius: 14px;
      background: rgba(43,191,178,0.18);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 28px;
      color: #2BBFB2;
    }
    .opt .text { flex: 1; }
    .opt .name { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 2px; }
    .opt .desc { font-size: 13px; opacity: 0.65; }
    .opt .arrow { font-size: 22px; opacity: 0.5; }
    .small { font-size: 13px; opacity: 0.55; margin-top: 12px; }
    .small a { color: rgba(255,255,255,0.75); text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon"><img src="../assets/apps/firmapro.png" alt="FirmaPro" /></div>
    <h1>Firma<span class="accent">Pro</span></h1>
    <p class="subtitle">Küçük işletmenin cep muhasebecisi</p>

    <div class="prompt">Nasıl kullanmak istersin?</div>

    <div class="options">
      <a class="opt" id="optPlay" href="https://play.google.com/store/apps/details?id=com.iscim.iscim">
        <div class="glyph">▶</div>
        <div class="text">
          <div class="name">Google Play</div>
          <div class="desc">Android telefonda indir, cebinde yönet</div>
        </div>
        <div class="arrow">→</div>
      </a>
      <a class="opt" id="optWeb" href="https://firmapro.web.app">
        <div class="glyph">⌁</div>
        <div class="text">
          <div class="name">Web app</div>
          <div class="desc">Tarayıcıdan, indirmeye gerek yok</div>
        </div>
        <div class="arrow">→</div>
      </a>
    </div>

    <p class="small"><a href="https://bykdgstudio.github.io/">Bykdg Studio</a></p>
  </div>
  <script>
    (function() {
      var ua = navigator.userAgent || '';
      var isMobile = /Android|iPhone|iPad|iPod|Mobile|Tablet/i.test(ua) ||
                     (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      var play = document.getElementById('optPlay');
      var web = document.getElementById('optWeb');
      var recommended = isMobile ? play : web;
      if (recommended) {
        recommended.classList.add('recommended');
        var badge = document.createElement('div');
        badge.className = 'badge';
        badge.textContent = 'Önerilen';
        recommended.appendChild(badge);
        // Move the recommended option to the top
        recommended.parentNode.insertBefore(recommended, recommended.parentNode.firstChild);
      }
    })();
  </script>
</body>
</html>
