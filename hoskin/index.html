<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Hoşkin Arena — Mağazaya yönlendiriliyor</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(ellipse at 50% 40%, #1A4D2E 0%, #0A2A18 65%, #050D08 100%);
      color: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-height: 100vh;
    }
    .card { max-width: 460px; width: 100%; text-align: center; }
    .icon {
      width: 130px; height: 130px;
      border-radius: 30px;
      overflow: hidden;
      margin: 0 auto 28px;
      border: 3px solid #DAA520;
      box-shadow: 0 12px 32px rgba(0,0,0,0.5), 0 0 60px rgba(218,165,32,0.3);
    }
    .icon img { width: 100%; height: 100%; display: block; }
    h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
    h1 .accent { color: #DAA520; }
    .subtitle { font-size: 15px; color: #C8E0D0; opacity: 0.75; margin-bottom: 36px; }
    .spinner {
      width: 36px; height: 36px; margin: 0 auto 24px;
      border: 3px solid rgba(218,165,32,0.25);
      border-top-color: #DAA520;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { font-size: 16px; font-weight: 500; opacity: 0.85; margin-bottom: 28px; }
    .actions {
      display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, #DAA520 0%, #B8860B 100%);
      color: #0A2A18;
      padding: 16px 28px;
      border-radius: 14px;
      font-size: 15px; font-weight: 700;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(218,165,32,0.35);
      transition: transform .15s;
    }
    .btn.secondary {
      background: transparent;
      color: #FFFFFF;
      border: 1.5px solid rgba(218,165,32,0.5);
      box-shadow: none;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }
    .small { font-size: 13px; opacity: 0.55; margin-top: 28px; }
    .small a { color: rgba(255,255,255,0.75); text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon"><img src="../assets/apps/hoskin.png" alt="Hoşkin Arena" /></div>
    <h1>Hoşkin <span class="accent">Arena</span></h1>
    <p class="subtitle">Türk kart oyunu · Çok oyunculu</p>
    <div class="spinner"></div>
    <p class="status" id="status">Cihazına uygun mağazaya yönlendiriliyorsun…</p>
    <div class="actions">
      <a class="btn" id="googleBtn" href="https://play.google.com/store/apps/details?id=com.hoskin.hoskin_arena">Google Play</a>
      <a class="btn secondary" id="appleBtn" href="https://apps.apple.com/app/id6763230620">App Store</a>
    </div>
    <p class="small"><a href="https://bykdgstudio.github.io/">Bykdg Studio</a></p>
  </div>
  <script>
    (function() {
      var PLAY = 'https://play.google.com/store/apps/details?id=com.hoskin.hoskin_arena';
      var APPLE = 'https://apps.apple.com/app/id6763230620';
      var ua = navigator.userAgent || '';
      var platform = navigator.platform || '';
      var isIOS = /iPhone|iPad|iPod/i.test(ua) ||
                  (platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      var target = isIOS ? APPLE : PLAY;

      // Visually swap primary button so the matching store is highlighted
      var googleBtn = document.getElementById('googleBtn');
      var appleBtn = document.getElementById('appleBtn');
      if (isIOS && googleBtn && appleBtn) {
        googleBtn.classList.add('secondary');
        appleBtn.classList.remove('secondary');
      }

      setTimeout(function() {
        window.location.replace(target);
      }, 600);
    })();
  </script>
</body>
</html>
